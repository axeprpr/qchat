name: release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: windows-x64
            os: windows
            runs_on: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            package_name: qchat-windows-x64
          - target_name: linux-x64
            os: linux
            runs_on: ubuntu-latest
            qt_host: linux
            qt_arch: linux_gcc_64
            package_name: qchat-linux-x64
          - target_name: macos-universal
            os: macos
            runs_on: macos-latest
            qt_host: mac
            qt_arch: clang_64
            package_name: qchat-macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qt5compat qtmultimedia
          cache: true

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows'
        run: choco install ninja -y

      - name: Install Ninja (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $appVersion = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          if ("${{ github.ref_type }}" -eq "tag") {
            $appVersion = $refName.TrimStart('v')
          }
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Build and Deploy (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          @echo off
          setlocal
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_PATH=%%i"
          if "%VS_PATH%"=="" (
            echo [ERROR] Visual Studio build tools not found.
            exit /b 1
          )
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64
          call scripts\build_windows.bat
          endlocal

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh Release

      - name: Package Windows Artifact
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.app_version }}"
          $DeployDir = "build-win/deploy"
          if (-not (Test-Path "$DeployDir/QChat.exe")) {
            throw "QChat.exe not found in $DeployDir"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $ZipName = "${{ matrix.package_name }}-v$Version.zip"
          Compress-Archive -Path "$DeployDir/*" -DestinationPath "release/$ZipName" -Force

          $Hash = (Get-FileHash "release/$ZipName" -Algorithm SHA256).Hash.ToLower()
          "$Hash  $ZipName" | Out-File -FilePath "release/$ZipName.sha256.txt" -Encoding ascii

      - name: Package Linux Artifact
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.app_version }}"
          BIN="build/bin/QChat"
          if [ ! -f "$BIN" ] && [ -f "build/QChat" ]; then
            BIN="build/QChat"
          fi
          if [ ! -f "$BIN" ]; then
            echo "QChat binary not found at $BIN" >&2
            exit 1
          fi

          mkdir -p release/stage
          cp "$BIN" release/stage/QChat
          chmod +x release/stage/QChat

          PKG="${{ matrix.package_name }}-v${VERSION}.tar.gz"
          tar -czf "release/${PKG}" -C release/stage QChat
          HASH="$(sha256sum "release/${PKG}" | awk '{print tolower($1)}')"
          echo "${HASH}  ${PKG}" > "release/${PKG}.sha256.txt"

      - name: Package macOS Artifact
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.app_version }}"
          APP_PATH=""

          if [ -d "build/bin/QChat.app" ]; then
            APP_PATH="build/bin/QChat.app"
          elif [ -d "build/QChat.app" ]; then
            APP_PATH="build/QChat.app"
          elif [ -d "build/Release/QChat.app" ]; then
            APP_PATH="build/Release/QChat.app"
          fi

          if [ -z "$APP_PATH" ]; then
            echo "QChat.app not found under build output" >&2
            exit 1
          fi

          "$QT_ROOT_DIR/bin/macdeployqt" "$APP_PATH" -qmldir=src/qml

          mkdir -p release
          PKG="${{ matrix.package_name }}-v${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release/${PKG}"
          HASH="$(shasum -a 256 "release/${PKG}" | awk '{print tolower($1)}')"
          echo "${HASH}  ${PKG}" > "release/${PKG}.sha256.txt"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}-v${{ steps.version.outputs.app_version }}
          path: |
            release/*.zip
            release/*.tar.gz
            release/*.sha256.txt
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release-dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: QChat ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-dist/*

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Upload OSS mirror
        env:
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ALIYUN_OSS_ENDPOINT}" ] || [ -z "${ALIYUN_OSS_BUCKET}" ] || [ -z "${ALIYUN_ACCESS_KEY_ID}" ] || [ -z "${ALIYUN_ACCESS_KEY_SECRET}" ]; then
            echo "OSS secrets not fully configured, skip OSS upload."
            exit 0
          fi
          python -m pip install --disable-pip-version-check --quiet oss2
          python <<'PY'
          import mimetypes
          import os
          from pathlib import Path

          import oss2

          endpoint = os.environ["ALIYUN_OSS_ENDPOINT"].strip()
          bucket_name = os.environ["ALIYUN_OSS_BUCKET"].strip()
          access_key_id = os.environ["ALIYUN_ACCESS_KEY_ID"].strip()
          access_key_secret = os.environ["ALIYUN_ACCESS_KEY_SECRET"].strip()
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          prefix = os.environ.get("ALIYUN_OSS_PREFIX", "").strip().strip("/")
          base_prefix = f"{prefix}/qchat" if prefix else "qchat"

          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, f"https://{endpoint}", bucket_name)

          targets = [f"{base_prefix}/{ref_name}", f"{base_prefix}/latest"]
          files = sorted(path for path in Path("release-dist").iterdir() if path.is_file())
          if not files:
              raise SystemExit("no release artifacts found")

          urls = []
          for artifact in files:
              content_type, _ = mimetypes.guess_type(artifact.name)
              headers = {}
              if content_type:
                  headers["Content-Type"] = content_type
              for target in targets:
                  key = f"{target}/{artifact.name}"
                  bucket.put_object_from_file(key, str(artifact), headers=headers)
                  url = f"https://{bucket_name}.{endpoint}/{key}"
                  urls.append(url)
                  print(f"uploaded {artifact.name} -> {key}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("\n## OSS mirror\n")
                  for url in urls:
                      fh.write(f"- `{url}`\n")
          PY
