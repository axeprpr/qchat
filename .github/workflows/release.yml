name: release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: windows-x64
            os: windows
            runs_on: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            package_name: qchat-windows-x64
          - target_name: linux-x64
            os: linux
            runs_on: ubuntu-latest
            qt_host: linux
            qt_arch: linux_gcc_64
            package_name: qchat-linux-x64
          - target_name: macos-universal
            os: macos
            runs_on: macos-latest
            qt_host: mac
            qt_arch: clang_64
            package_name: qchat-macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qt5compat qtmultimedia qtshadertools
          cache: true

      - name: Install Ninja (Windows)
        if: matrix.os == 'windows'
        run: choco install ninja nsis -y

      - name: Install Ninja (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build libfuse2 patchelf desktop-file-utils librsvg2-bin

      - name: Install Ninja (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          brew install ninja

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $appVersion = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          if ("${{ github.ref_type }}" -eq "tag") {
            $appVersion = $refName.TrimStart('v')
          }
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Build and Deploy (Windows)
        if: matrix.os == 'windows'
        shell: cmd
        run: |
          @echo off
          setlocal
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_PATH=%%i"
          if "%VS_PATH%"=="" (
            echo [ERROR] Visual Studio build tools not found.
            exit /b 1
          )
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64
          call scripts\build_windows.bat
          endlocal

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build_linux.sh
          ./scripts/build_linux.sh Release

      - name: Package Windows Artifact
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.app_version }}"
          $DeployDir = "build-win/deploy"
          if (-not (Test-Path "$DeployDir/QChat.exe")) {
            throw "QChat.exe not found in $DeployDir"
          }
          if (-not (Test-Path "$DeployDir/qchat.ico")) {
            throw "qchat.ico not found in $DeployDir"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $ExeName = "${{ matrix.package_name }}-v$Version.exe"
          $DeployPath = (Resolve-Path $DeployDir).Path
          $DeployPathForNsis = $DeployPath.Replace('\', '\\')
          $OutFilePath = (Resolve-Path "release").Path + "\\" + $ExeName
          $OutFilePathForNsis = $OutFilePath.Replace('\', '\\')
          $IconPath = (Resolve-Path "$DeployDir/qchat.ico").Path
          $IconPathForNsis = $IconPath.Replace('\', '\\')
          $NsiScript = @'
          Unicode true
          Name "QChat"
          OutFile "__OUTFILE__"
          Icon "__ICON_PATH__"
          UninstallIcon "__ICON_PATH__"
          InstallDir "$LOCALAPPDATA\QChat"
          RequestExecutionLevel user
          Page directory
          Page instfiles
          UninstPage uninstConfirm
          UninstPage instfiles

          Section "Install"
            SetOutPath "$INSTDIR"
            File /r "__DEPLOY_PATH__\*.*"
            CreateDirectory "$SMPROGRAMS\QChat"
            CreateShortcut "$SMPROGRAMS\QChat\QChat.lnk" "$INSTDIR\QChat.exe" "" "$INSTDIR\qchat.ico" 0
            CreateShortcut "$SMPROGRAMS\QChat\Uninstall QChat.lnk" "$INSTDIR\Uninstall.exe"
            CreateShortcut "$DESKTOP\QChat.lnk" "$INSTDIR\QChat.exe" "" "$INSTDIR\qchat.ico" 0
            WriteUninstaller "$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$DESKTOP\QChat.lnk"
            Delete "$SMPROGRAMS\QChat\QChat.lnk"
            Delete "$SMPROGRAMS\QChat\Uninstall QChat.lnk"
            RMDir "$SMPROGRAMS\QChat"
            RMDir /r "$INSTDIR"
          SectionEnd
          '@
          $NsiScript = $NsiScript.Replace("__OUTFILE__", $OutFilePathForNsis)
          $NsiScript = $NsiScript.Replace("__DEPLOY_PATH__", $DeployPathForNsis)
          $NsiScript = $NsiScript.Replace("__ICON_PATH__", $IconPathForNsis)
          $NsiScript | Out-File -FilePath "release/installer.nsi" -Encoding ascii

          $NsisExe = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          if (-not (Test-Path $NsisExe)) {
            $NsisExe = (Get-Command makensis.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)
          }
          if (-not $NsisExe) {
            throw "makensis.exe not found"
          }

          & $NsisExe "release/installer.nsi"
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS packaging failed"
          }

          $Hash = (Get-FileHash "release/$ExeName" -Algorithm SHA256).Hash.ToLower()
          "$Hash  $ExeName" | Out-File -FilePath "release/$ExeName.sha256.txt" -Encoding ascii

      - name: Package Linux Artifact
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.app_version }}"
          BIN=""
          for candidate in \
            build/bin/qchat \
            build/qchat \
            build/Release/qchat \
            build/bin/QChat \
            build/QChat \
            build/Release/QChat; do
            if [ -f "${candidate}" ]; then
              BIN="${candidate}"
              break
            fi
          done
          if [ -z "${BIN}" ]; then
            echo "QChat binary not found in expected locations" >&2
            ls -lah build || true
            ls -lah build/bin || true
            exit 1
          fi

          mkdir -p release appimage/AppDir/usr/bin appimage/tools
          cp "${BIN}" appimage/AppDir/usr/bin/qchat
          chmod +x appimage/AppDir/usr/bin/qchat
          ln -sf qchat appimage/AppDir/usr/bin/QChat

          cat > appimage/qchat.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=QChat
          Exec=qchat
          Icon=qchat
          Categories=Utility;
          Terminal=false
          EOF

          rsvg-convert -w 256 -h 256 resources/icons/logo.svg -o appimage/qchat.png

          wget -q -O appimage/tools/linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O appimage/tools/linuxdeploy-plugin-qt.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x appimage/tools/linuxdeploy.AppImage appimage/tools/linuxdeploy-plugin-qt.AppImage
          ln -sf "$(pwd)/appimage/tools/linuxdeploy-plugin-qt.AppImage" appimage/tools/linuxdeploy-plugin-qt

          export APPIMAGE_EXTRACT_AND_RUN=1
          export VERSION
          export QMAKE="$QT_ROOT_DIR/bin/qmake"
          export PATH="$(pwd)/appimage/tools:$PATH"
          pushd appimage
          ./tools/linuxdeploy.AppImage --appdir AppDir -e AppDir/usr/bin/qchat -d qchat.desktop -i qchat.png --plugin qt --output appimage
          popd

          APPIMAGE_FILE="$(find appimage -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' | head -n 1)"
          if [ -z "${APPIMAGE_FILE}" ]; then
            echo "AppImage was not generated" >&2
            exit 1
          fi

          PKG="${{ matrix.package_name }}-v${VERSION}.AppImage"
          mv "${APPIMAGE_FILE}" "release/${PKG}"
          chmod +x "release/${PKG}"
          HASH="$(sha256sum "release/${PKG}" | awk '{print tolower($1)}')"
          echo "${HASH}  ${PKG}" > "release/${PKG}.sha256.txt"

      - name: Package macOS Artifact
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.app_version }}"
          APP_PATH=""

          if [ -d "build/bin/QChat.app" ]; then
            APP_PATH="build/bin/QChat.app"
          elif [ -d "build/QChat.app" ]; then
            APP_PATH="build/QChat.app"
          elif [ -d "build/Release/QChat.app" ]; then
            APP_PATH="build/Release/QChat.app"
          fi

          if [ -z "$APP_PATH" ]; then
            echo "QChat.app not found under build output" >&2
            exit 1
          fi

          "$QT_ROOT_DIR/bin/macdeployqt" "$APP_PATH" -qmldir=src/qml

          mkdir -p release
          STAGE_DIR="release/dmg-root"
          rm -rf "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}"
          cp -R "$APP_PATH" "${STAGE_DIR}/QChat.app"
          PKG="${{ matrix.package_name }}-v${VERSION}.dmg"
          hdiutil create -volname "QChat" -srcfolder "${STAGE_DIR}" -ov -format UDZO "release/${PKG}"
          HASH="$(shasum -a 256 "release/${PKG}" | awk '{print tolower($1)}')"
          echo "${HASH}  ${PKG}" > "release/${PKG}.sha256.txt"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}-v${{ steps.version.outputs.app_version }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
            release/*.sha256.txt
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release-dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: QChat ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-dist/*

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Upload OSS mirror
        env:
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ALIYUN_OSS_ENDPOINT}" ] || [ -z "${ALIYUN_OSS_BUCKET}" ] || [ -z "${ALIYUN_ACCESS_KEY_ID}" ] || [ -z "${ALIYUN_ACCESS_KEY_SECRET}" ]; then
            echo "OSS secrets not fully configured, skip OSS upload."
            exit 0
          fi
          python -m pip install --disable-pip-version-check --quiet oss2
          python <<'PY'
          import mimetypes
          import os
          from pathlib import Path

          import oss2

          endpoint = os.environ["ALIYUN_OSS_ENDPOINT"].strip()
          bucket_name = os.environ["ALIYUN_OSS_BUCKET"].strip()
          access_key_id = os.environ["ALIYUN_ACCESS_KEY_ID"].strip()
          access_key_secret = os.environ["ALIYUN_ACCESS_KEY_SECRET"].strip()
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          prefix = os.environ.get("ALIYUN_OSS_PREFIX", "").strip().strip("/")
          base_prefix = f"{prefix}/qchat" if prefix else "qchat"

          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, f"https://{endpoint}", bucket_name)

          targets = [f"{base_prefix}/{ref_name}", f"{base_prefix}/latest"]
          files = sorted(path for path in Path("release-dist").iterdir() if path.is_file())
          if not files:
              raise SystemExit("no release artifacts found")

          urls = []
          for artifact in files:
              content_type, _ = mimetypes.guess_type(artifact.name)
              headers = {}
              if content_type:
                  headers["Content-Type"] = content_type
              for target in targets:
                  key = f"{target}/{artifact.name}"
                  bucket.put_object_from_file(key, str(artifact), headers=headers)
                  url = f"https://{bucket_name}.{endpoint}/{key}"
                  urls.append(url)
                  print(f"uploaded {artifact.name} -> {key}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("\n## OSS mirror\n")
                  for url in urls:
                      fh.write(f"- `{url}`\n")
          PY
