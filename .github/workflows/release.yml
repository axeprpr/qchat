name: release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qt5compat qtmultimedia"

      - name: Install Ninja
        run: choco install ninja -y

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $appVersion = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          if ("${{ github.ref_type }}" -eq "tag") {
            $appVersion = $refName.TrimStart('v')
          }
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT

      - name: Build and Deploy (Windows)
        shell: cmd
        run: |
          @echo off
          setlocal
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_PATH=%%i"
          if "%VS_PATH%"=="" (
            echo [ERROR] Visual Studio build tools not found.
            exit /b 1
          )
          call "%VS_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64
          call scripts\build_windows.bat
          endlocal

      - name: Package Release Files
        shell: pwsh
        run: |
          $Version = "${{ steps.version.outputs.app_version }}"
          $DeployDir = "build-win/deploy"
          if (-not (Test-Path "$DeployDir/QChat.exe")) {
            throw "QChat.exe not found in $DeployDir"
          }

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $ZipName = "qchat-windows-x64-v$Version.zip"
          Compress-Archive -Path "$DeployDir/*" -DestinationPath "release/$ZipName" -Force

          $Hash = (Get-FileHash "release/$ZipName" -Algorithm SHA256).Hash.ToLower()
          "$Hash  $ZipName" | Out-File -FilePath "release/$ZipName.sha256.txt" -Encoding ascii

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qchat-win-x64-v${{ steps.version.outputs.app_version }}
          path: |
            release/*.zip
            release/*.sha256.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: QChat v${{ steps.version.outputs.app_version }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release/*.zip
            release/*.sha256.txt

      - name: Set up Python
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Upload OSS mirror
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_PREFIX }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ALIYUN_OSS_ENDPOINT}" ] || [ -z "${ALIYUN_OSS_BUCKET}" ] || [ -z "${ALIYUN_ACCESS_KEY_ID}" ] || [ -z "${ALIYUN_ACCESS_KEY_SECRET}" ]; then
            echo "OSS secrets not fully configured, skip OSS upload."
            exit 0
          fi
          python -m pip install --disable-pip-version-check --quiet oss2
          python <<'PY'
          import mimetypes
          import os
          from pathlib import Path

          import oss2

          endpoint = os.environ["ALIYUN_OSS_ENDPOINT"].strip()
          bucket_name = os.environ["ALIYUN_OSS_BUCKET"].strip()
          access_key_id = os.environ["ALIYUN_ACCESS_KEY_ID"].strip()
          access_key_secret = os.environ["ALIYUN_ACCESS_KEY_SECRET"].strip()
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          prefix = os.environ.get("ALIYUN_OSS_PREFIX", "").strip().strip("/")
          base_prefix = f"{prefix}/qchat" if prefix else "qchat"

          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, f"https://{endpoint}", bucket_name)

          targets = [f"{base_prefix}/{ref_name}", f"{base_prefix}/latest"]
          files = sorted(path for path in Path("release").iterdir() if path.is_file())
          if not files:
              raise SystemExit("no release artifacts found")

          urls = []
          for artifact in files:
              content_type, _ = mimetypes.guess_type(artifact.name)
              headers = {}
              if content_type:
                  headers["Content-Type"] = content_type
              for target in targets:
                  key = f"{target}/{artifact.name}"
                  bucket.put_object_from_file(key, str(artifact), headers=headers)
                  url = f"https://{bucket_name}.{endpoint}/{key}"
                  urls.append(url)
                  print(f"uploaded {artifact.name} -> {key}")

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("\n## OSS mirror\n")
                  for url in urls:
                      fh.write(f"- `{url}`\n")
          PY
